<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Wallet | Innovation Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        
        :root {
            --bit-cyan: #00bcd4;
            --bit-bg: linear-gradient(135deg, #e0f2fe 0%, #ede9fe 50%, #fee2e2 100%);
            --bit-card-bg: rgba(255, 255, 255, 0.7);
            --bit-text-main: #0f172a;
            --bit-text-muted: #64748b;
            --color-income-bg: #dcfce7;
            --color-income-text: #064e3b;
            --color-expense-bg: #fee2e2;
            --color-expense-text: #450a0a;
            --color-success: #10b981;
            --color-danger: #ef4444;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bit-bg);
            color: var(--bit-text-main);
            min-height: 100vh;
            padding-bottom: 110px;
        }

        .bit-card {
            background: var(--bit-card-bg);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .action-card-income { background: var(--color-income-bg) !important; color: var(--color-income-text) !important; backdrop-filter: none; }
        .action-card-expense { background: var(--color-expense-bg) !important; color: var(--color-expense-text) !important; backdrop-filter: none; }

        .pocket-chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 140px; 
            padding: 1rem; /* צמצום קל של ריווח פנימי כדי לפנות מקום לטקסט הגדול */
            border: none;
            color: white;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pocket-chip::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        .pocket-chip.inactive {
            opacity: 0.6;
            transform: scale(0.95);
            filter: grayscale(0.2);
        }

        .pocket-chip.active {
            transform: translateY(-6px);
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .btn-bit {
            background-color: var(--bit-text-main);
            color: white;
            transition: all 0.2s;
        }

        .nav-item { color: var(--bit-text-muted); transition: all 0.2s ease; }
        .nav-item.active { color: var(--bit-cyan); }

        .view-content { display: none; }
        .view-content.active { display: block; animation: fadeIn 0.3s ease-out; }

        input, select {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: var(--bit-text-main) !important;
        }

        .history-card {
            border: none !important;
            position: relative;
            overflow: hidden;
        }
        
        .history-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: currentColor;
            opacity: 0.22;
            z-index: 0;
        }

        .history-card > * { position: relative; z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">SmartWallet</h1>
                <p class="text-slate-600 text-sm font-medium">ניהול כספים חכם ומעוצב</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSettings()" class="w-12 h-12 bit-card flex items-center justify-center hover:bg-slate-100/50 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                    </svg>
                </button>
            </div>
        </header>

        <div id="viewActions" class="view-content active">
            <div id="actionCard" class="bit-card p-6 shadow-xl action-card-income">
                <div class="flex bg-black/5 p-1 rounded-2xl mb-8">
                    <button id="typeIncome" onclick="setType('income')" class="flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold shadow-sm transition-all">הכנסה</button>
                    <button id="typeExpense" onclick="setType('expense')" class="flex-1 py-3 rounded-xl text-slate-600 font-bold transition-all">הוצאה</button>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold mb-2 block">בחר כיס יעד</label>
                        <select id="pocketSelect" class="w-full p-4 rounded-2xl font-bold outline-none"></select>
                    </div>

                    <div>
                        <label class="text-xs font-bold mb-2 block text-right">סכום הפעולה</label>
                        <div class="relative">
                            <input type="number" id="amount" class="w-full p-4 rounded-2xl text-3xl font-black text-left outline-none" placeholder="0.00">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 font-bold opacity-40 text-2xl">₪</span>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold mb-2 block">תיאור (אופציונלי)</label>
                        <input type="text" id="description" class="w-full p-4 rounded-2xl font-medium outline-none" placeholder="מה המטרה?">
                    </div>

                    <button id="saveBtn" onclick="saveTransaction()" class="w-full btn-bit font-black py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                        <span>עדכן ארנק</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="viewHistory" class="view-content">
            <div class="mb-8">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-slate-700">הכיסים שלך</h3>
                    <button id="clearFilter" onclick="filterByPocket(null)" class="hidden text-xs font-bold px-3 py-1 rounded-full bg-slate-200 text-slate-700">הצג הכל</button>
                </div>
                <div id="pocketsContainer" class="flex gap-4 overflow-x-auto pb-6 pt-2 no-scrollbar"></div>
            </div>

            <h3 id="historyTitle" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 px-1">כל הפעולות</h3>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-slate-100/50 px-10 py-5 flex justify-around items-center z-40 bg-white/70 backdrop-blur-xl shadow-lg">
        <button onclick="switchView('actions')" id="navActions" class="nav-item active flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            <span class="text-[10px] font-bold">חדש</span>
        </button>
        <button onclick="switchView('history')" id="navHistory" class="nav-item flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2" /></svg>
            <span class="text-[10px] font-bold">פעולות</span>
        </button>
    </nav>

    <div id="settingsModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-50 flex items-end sm:items-center justify-center">
        <div class="bit-card w-full max-w-sm rounded-t-[40px] sm:rounded-[40px] p-8 animate__animated animate__slideInUp bg-white/90">
            <h3 class="text-xl font-extrabold mb-6 text-slate-900">הגדרות כיסים</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 block mb-3 uppercase">הוספת כיס חדש</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="newPocketColor" value="#0ea5e9" class="cursor-pointer h-12 w-12 rounded-xl border-none p-0">
                        <input type="text" id="newPocketName" class="flex-1 p-4 rounded-2xl font-bold text-right outline-none" placeholder="שם הכיס">
                        <button onclick="addPocket()" class="btn-bit w-12 h-12 rounded-2xl font-bold flex items-center justify-center shadow-md">+</button>
                    </div>
                </div>
                <div id="pocketsManagerList" class="max-h-60 overflow-y-auto space-y-3 no-scrollbar"></div>
            </div>
            <button onclick="toggleSettings()" class="w-full mt-8 py-4 text-slate-500 font-bold bg-slate-100/50 rounded-2xl">סגור</button>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('bit_wallet_tx_light')) || [];
        let pockets = JSON.parse(localStorage.getItem('bit_wallet_pockets_light')) || [
            { id: 'p1', name: 'עובר ושב', balance: 0, color: '#0ea5e9' },
            { id: 'p2', name: 'חיסכון', balance: 0, color: '#8b5cf6' },
            { id: 'p3', name: 'מזומן', balance: 0, color: '#f59e0b' }
        ];
        let currentType = 'income';
        let selectedFilter = null;

        window.onload = () => {
            renderPockets();
            updateUI();
        };

        function saveData() {
            localStorage.setItem('bit_wallet_tx_light', JSON.stringify(transactions));
            localStorage.setItem('bit_wallet_pockets_light', JSON.stringify(pockets));
        }

        function switchView(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (view === 'actions') {
                document.getElementById('viewActions').classList.add('active');
                document.getElementById('navActions').classList.add('active');
            } else {
                document.getElementById('viewHistory').classList.add('active');
                document.getElementById('navHistory').classList.add('active');
                updateUI();
            }
        }

        function setType(type) {
            currentType = type;
            const card = document.getElementById('actionCard');
            const incBtn = document.getElementById('typeIncome');
            const expBtn = document.getElementById('typeExpense');
            if (type === 'income') {
                card.className = "bit-card p-6 shadow-xl action-card-income";
                incBtn.className = "flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold shadow-sm transition-all";
                expBtn.className = "flex-1 py-3 rounded-xl text-emerald-800 font-bold transition-all";
            } else {
                card.className = "bit-card p-6 shadow-xl action-card-expense";
                expBtn.className = "flex-1 py-3 rounded-xl bg-rose-600 text-white font-bold shadow-sm transition-all";
                incBtn.className = "flex-1 py-3 rounded-xl text-rose-800 font-bold transition-all";
            }
        }

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }

        function addPocket() {
            const name = document.getElementById('newPocketName').value.trim();
            const color = document.getElementById('newPocketColor').value;
            if (!name) return;
            pockets.push({ id: 'p' + Date.now(), name, balance: 0, color });
            document.getElementById('newPocketName').value = '';
            saveData();
            renderPockets();
        }

        function removePocket(id) {
            if (pockets.length <= 1) return;
            pockets = pockets.filter(p => p.id !== id);
            saveData();
            renderPockets();
        }

        function filterByPocket(id) {
            selectedFilter = id;
            renderPockets();
            updateUI();
        }

        function renderPockets() {
            const container = document.getElementById('pocketsContainer');
            const select = document.getElementById('pocketSelect');
            const manager = document.getElementById('pocketsManagerList');
            const clearBtn = document.getElementById('clearFilter');
            
            container.innerHTML = '';
            select.innerHTML = '';
            manager.innerHTML = '';

            selectedFilter ? clearBtn.classList.remove('hidden') : clearBtn.classList.add('hidden');

            pockets.forEach(p => {
                const isActive = selectedFilter === p.id;
                const chip = document.createElement('div');
                chip.onclick = () => filterByPocket(p.id);
                
                chip.className = `bit-card pocket-chip flex-shrink-0 cursor-pointer ${isActive ? 'active' : 'inactive'}`;
                chip.style.backgroundColor = p.color;

                // הגדלת טקסט מקסימלית בתוך הכפתור
                chip.innerHTML = `
                    <span class="text-lg font-extrabold uppercase tracking-tighter leading-none mb-1 text-white">${p.name}</span>
                    <span class="text-3xl font-black leading-none text-white">₪${p.balance.toLocaleString()}</span>
                `;
                container.appendChild(chip);

                const opt = document.createElement('option');
                opt.value = p.id;
                opt.innerText = p.name;
                select.appendChild(opt);

                const item = document.createElement('div');
                item.className = "flex justify-between items-center p-4 rounded-2xl border-r-4 bg-slate-50/70";
                item.style.borderColor = p.color;
                item.innerHTML = `<span class="font-bold">${p.name}</span><button onclick="removePocket('${p.id}')" class="text-rose-600 font-bold text-xs uppercase">מחק</button>`;
                manager.appendChild(item);
            });
        }

        function saveTransaction() {
            const amountInput = document.getElementById('amount');
            const descInput = document.getElementById('description');
            const pocketId = document.getElementById('pocketSelect').value;
            const amount = parseFloat(amountInput.value);

            if (isNaN(amount) || amount <= 0) return;

            const pocket = pockets.find(p => p.id === pocketId);
            const transaction = {
                id: Date.now(),
                type: currentType,
                amount,
                pocketName: pocket.name,
                pocketId: pocketId,
                pocketColor: pocket.color,
                description: descInput.value || (currentType === 'income' ? "הכנסה" : "הוצאה"),
                date: new Date().toLocaleDateString('he-IL') + ' ' + new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})
            };

            currentType === 'income' ? pocket.balance += amount : pocket.balance -= amount;
            transactions.unshift(transaction);
            saveData();

            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = "<span>עודכן בהצלחה!</span>";
            saveBtn.classList.replace('btn-bit', 'bg-emerald-600');
            
            setTimeout(() => {
                saveBtn.innerHTML = originalText;
                saveBtn.className = "w-full btn-bit font-black py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all shadow-md";
                amountInput.value = '';
                descInput.value = '';
                renderPockets();
                switchView('history');
            }, 800);
        }

        function deleteTransaction(id) {
            const tx = transactions.find(t => t.id === id);
            if (!tx) return;
            const pocket = pockets.find(p => p.id === tx.pocketId);
            if (pocket) tx.type === 'income' ? pocket.balance -= tx.amount : pocket.balance += tx.amount;
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            renderPockets();
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('historyList');
            const title = document.getElementById('historyTitle');
            list.innerHTML = '';
            const filtered = selectedFilter ? transactions.filter(t => t.pocketId === selectedFilter) : transactions;
            
            if (selectedFilter) {
                const p = pockets.find(p => p.id === selectedFilter);
                title.innerHTML = `פעולות בכיס <span style="color: ${p?.color}; font-weight: bold;">${p?.name}</span>`;
            } else {
                title.innerText = "כל הפעולות";
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20 opacity-40 font-bold">אין תנועות עדיין</div>`;
                return;
            }

            filtered.forEach(t => {
                const card = document.createElement('div');
                card.className = "bit-card p-5 flex justify-between items-center history-card animate__animated animate__fadeInUp group";
                card.style.color = t.pocketColor;
                const isIncome = t.type === 'income';
                const actionColor = isIncome ? 'var(--color-success)' : 'var(--color-danger)';
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center bg-white/90 font-bold shadow-sm" style="color: ${actionColor}">
                            ${isIncome ? '↑' : '↓'}
                        </div>
                        <div>
                            <p class="font-extrabold text-base leading-tight text-slate-900">${t.description}</p>
                            <p class="text-[10px] font-bold text-slate-700">${t.date} • ${t.pocketName}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-black text-lg" style="color: ${actionColor}">
                            ${isIncome ? '+' : '-'}${t.amount.toLocaleString()} ₪
                        </p>
                        <button onclick="deleteTransaction(${t.id})" class="p-2 rounded-full hover:bg-black/10 transition-colors text-slate-900/60 hover:text-rose-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
